name: Deploy to Aliyun ECS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Debug
        run: |
          echo "secrets is:"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/./*/g'

      - name: Add ECS to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Connect to ECS and Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -f ~/.bashrc ]; then
                source ~/.bashrc
            fi
            if [ -f ~/.bash_profile ]; then
                source ~/.bash_profile
            fi

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" 2>/dev/null
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion" 2>/dev/null

            echo "===== ENV DUMP ====="
            echo "Node version: $(node -v)"
            echo "NPM version: $(npm -v)"
            echo "PATH: $PATH"
            echo "===================="
            cd /var/www/dui
            git checkout debug
            git pull origin debug
            npm install
            npm run build
            npm start
