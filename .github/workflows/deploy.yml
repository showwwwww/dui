name: Deploy to Aliyun ECS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Debug
        run: |
          echo "secrets is:"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/./*/g'

      - name: Add ECS to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Connect to ECS and Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/dui
            git checkout debug
            git pull origin debug
            /root/.nvm/versions/node/v20.16.0/bin/npm install
            /root/.nvm/versions/node/v20.16.0/bin/npm run build
            /root/.nvm/versions/node/v20.16.0/bin/npm start
